  <rect x="50" y="485" width="200" height="75" rx="10" fill="#2a1a1a" stroke="#EA4335" stroke-width="1"/>
  <text x="150" y="510" text-anchor="middle" fill="#EA4335" font-size="12" font-weight="700">Gemini 2.5 Flash</text>
  <text x="150" y="527" text-anchor="middle" fill="#c0c0d0" font-size="9">Step Planning &amp; JSON</text>
  <text x="150" y="542" text-anchor="middle" fill="#8b8ba0" font-size="9">Structured procedure generation</text>

  <!-- Imagen 4 Fast -->
  <rect x="280" y="485" width="200" height="75" rx="10" fill="#2a1a1a" stroke="#F29900" stroke-width="1"/>
  <text x="380" y="510" text-anchor="middle" fill="#F29900" font-size="12" font-weight="700">Imagen 4 Fast</text>
  <text x="380" y="527" text-anchor="middle" fill="#c0c0d0" font-size="9">Step Image Generation</text>
  <text x="380" y="542" text-anchor="middle" fill="#8b8ba0" font-size="9">4 images in parallel ~2s</text>

  <!-- YouTube Data API -->
  <rect x="510" y="485" width="200" height="75" rx="10" fill="#2a1a1a" stroke="#FF0000" stroke-width="1"/>
  <text x="610" y="510" text-anchor="middle" fill="#FF0000" font-size="12" font-weight="700">YouTube Data API v3</text>
  <text x="610" y="527" text-anchor="middle" fill="#c0c0d0" font-size="9">Tutorial Search</text>
  <text x="610" y="542" text-anchor="middle" fill="#8b8ba0" font-size="9">Relevant how-to videos</text>

  <!-- Arrows from Agent to Services -->
  <line x1="647" y1="295" x2="150" y2="485" stroke="#EA4335" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="735" y1="295" x2="380" y2="485" stroke="#F29900" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="790" y1="295" x2="610" y2="485" stroke="#FF0000" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ═══ DATA FLOW SECTION ═══ -->
  <rect x="30" y="610" width="890" height="170" rx="16" fill="#1e1e30" stroke="#8b8ba0" stroke-width="1" opacity="0.9" filter="url(#shadow)"/>
  <text x="50" y="638" fill="#a78bfa" font-size="12" font-weight="600" letter-spacing="1.5">DATA FLOW</text>

  <!-- Flow steps -->
  <rect x="50" y="655" width="155" height="50" rx="8" fill="#2e1065" stroke="#a78bfa" stroke-width="1"/>
  <text x="127" y="675" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="700">1. Audio In</text>
  <text x="127" y="693" text-anchor="middle" fill="#c0c0d0" font-size="8">16kHz PCM → base64</text>

  <text x="217" y="680" fill="#8b8ba0" font-size="14">→</text>

  <rect x="230" y="655" width="155" height="50" rx="8" fill="#1a2744" stroke="#4285F4" stroke-width="1"/>
  <text x="307" y="675" text-anchor="middle" fill="#669DF6" font-size="10" font-weight="700">2. Video In</text>
  <text x="307" y="693" text-anchor="middle" fill="#c0c0d0" font-size="8">720p JPEG → base64</text>

  <text x="397" y="680" fill="#8b8ba0" font-size="14">→</text>

  <rect x="410" y="655" width="155" height="50" rx="8" fill="#1a3a1a" stroke="#34A853" stroke-width="1"/>
  <text x="487" y="675" text-anchor="middle" fill="#5BB974" font-size="10" font-weight="700">3. Agent Process</text>
  <text x="487" y="693" text-anchor="middle" fill="#c0c0d0" font-size="8">Gemini + Tools</text>

  <text x="577" y="680" fill="#8b8ba0" font-size="14">→</text>

  <rect x="590" y="655" width="155" height="50" rx="8" fill="#2a1a1a" stroke="#F29900" stroke-width="1"/>
  <text x="667" y="675" text-anchor="middle" fill="#F29900" font-size="10" font-weight="700">4. Generate</text>
  <text x="667" y="693" text-anchor="middle" fill="#c0c0d0" font-size="8">Steps + Images + Videos</text>

  <text x="757" y="680" fill="#8b8ba0" font-size="14">→</text>

  <rect x="770" y="655" width="135" height="50" rx="8" fill="#2e1065" stroke="#a78bfa" stroke-width="1"/>
  <text x="837" y="675" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="700">5. Audio Out</text>
  <text x="837" y="693" text-anchor="middle" fill="#c0c0d0" font-size="8">PCM → Speakers</text>

  <!-- Languages -->
  <rect x="50" y="720" width="855" height="40" rx="8" fill="#16213e" stroke="#8b8ba0" stroke-width="0.5"/>
  <text x="475" y="745" text-anchor="middle" fill="#c0c0d0" font-size="10">🇺🇸 English  ·  🇪🇸 Spanish  ·  🇻🇳 Vietnamese  ·  🇫🇷 French  ·  🇨🇳 Mandarin — switch mid-conversation</text>

  <!-- ═══ BONUS SECTION ═══ -->
  <rect x="940" y="80" width="240" height="500" rx="16" fill="#1e1e30" stroke="#FBBC04" stroke-width="1" opacity="0.9" filter="url(#shadow)"/>
  <text x="960" y="108" fill="#FBBC04" font-size="12" font-weight="600" letter-spacing="1.5">HACKATHON</text>

  <text x="960" y="138" fill="#c0c0d0" font-size="10" font-weight="600">Track</text>
  <text x="960" y="155" fill="#a78bfa" font-size="11">🎤 Live Agents</text>

  <text x="960" y="185" fill="#c0c0d0" font-size="10" font-weight="600">Required Tech</text>
  <text x="960" y="202" fill="#4285F4" font-size="9">✓ Gemini Live API</text>
  <text x="960" y="217" fill="#4285F4" font-size="9">✓ Google ADK</text>
  <text x="960" y="232" fill="#4285F4" font-size="9">✓ Cloud Run</text>
  <text x="960" y="247" fill="#4285F4" font-size="9">✓ Imagen 4 Fast</text>
  <text x="960" y="262" fill="#4285F4" font-size="9">✓ YouTube Data API</text>

  <text x="960" y="292" fill="#c0c0d0" font-size="10" font-weight="600">Bonus Points</text>
  <text x="960" y="309" fill="#5BB974" font-size="9">✓ CI/CD (cloudbuild.yaml)</text>
  <text x="960" y="324" fill="#5BB974" font-size="9">✓ IaC (deploy.sh)</text>
  <text x="960" y="339" fill="#5BB974" font-size="9">✓ GDG Membership</text>
  <text x="960" y="354" fill="#FBBC04" font-size="9">☐ Blog Post (dev.to)</text>

  <text x="960" y="384" fill="#c0c0d0" font-size="10" font-weight="600">Demo Scenarios</text>
  <text x="960" y="401" fill="#c0c0d0" font-size="9">🚗 "Check my oil level"</text>
  <text x="960" y="416" fill="#c0c0d0" font-size="9">🔪 "Dice this onion"</text>
  <text x="960" y="431" fill="#c0c0d0" font-size="9">🛞 "Tire pressure light"</text>
  <text x="960" y="446" fill="#c0c0d0" font-size="9">🇪🇸 Language switch demo</text>

  <text x="960" y="476" fill="#c0c0d0" font-size="10" font-weight="600">Builder</text>
  <text x="960" y="493" fill="#a78bfa" font-size="10">Brandi Kinard</text>
  <text x="960" y="510" fill="#8b8ba0" font-size="8">github.com/Brandi-Kinard</text>
  <text x="960" y="527" fill="#8b8ba0" font-size="8">GDG Charlotte Member</text>
  <text x="960" y="550" fill="#FBBC04" font-size="9" font-weight="600">#GeminiLiveAgentChallenge</text>
</svg>
