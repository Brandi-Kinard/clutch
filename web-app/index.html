<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Clutch</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --header-bg: #1a1a2e;
  --accent-green: #2ecc71;
  --accent-red: #e74c3c;
  --card-bg: #ffffff;
  --body-bg: #f0f2f5;
  --text-primary: #1a1a2e;
  --text-secondary: #555;
  --shadow: 0 2px 8px rgba(0,0,0,0.1);
  --radius: 12px;
}

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
  font-size: 16px;
  background: var(--body-bg);
  color: var(--text-primary);
  -webkit-text-size-adjust: 100%;
  overflow: hidden;
}

/* ---- HEADER ---- */
header {
  background: var(--header-bg);
  color: #fff;
  padding: 16px 20px 12px;
  position: relative;
  z-index: 10;
}
header .top-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
header h1 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 0.5px;
}
header .tagline {
  font-size: 12px;
  color: #aaa;
  margin-top: 2px;
}
.header-controls {
  display: flex;
  align-items: center;
  gap: 12px;
}
#lang-select {
  background: rgba(255,255,255,0.12);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 6px;
  padding: 4px 8px;
  font-size: 13px;
  -webkit-appearance: none;
  appearance: none;
}
#lang-select option { color: #000; }
.settings-btn {
  background: none;
  border: none;
  color: #aaa;
  font-size: 20px;
  cursor: pointer;
  padding: 4px;
  line-height: 1;
}

/* ---- SETTINGS MODAL ---- */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: #fff;
  border-radius: var(--radius);
  padding: 24px;
  width: 90%;
  max-width: 360px;
}
.modal h2 { font-size: 18px; margin-bottom: 12px; }
.modal label { font-size: 14px; color: var(--text-secondary); display: block; margin-bottom: 4px; }
.modal input[type="text"] {
  width: 100%;
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 15px;
  margin-bottom: 16px;
}
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.modal-actions button {
  padding: 8px 16px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}
.btn-cancel { background: #eee; color: #333; }
.btn-save { background: var(--header-bg); color: #fff; }

/* ---- MAIN CONTENT ---- */
main {
  display: flex;
  flex-direction: column;
  height: calc(100% - 76px);
  overflow: hidden;
}

/* ---- CAMERA PREVIEW (small viewport during session) ---- */
.camera-container {
  position: relative;
  flex-shrink: 0;
}
#camera-preview {
  width: 100%;
  height: 180px;
  object-fit: cover;
  background: #000;
  display: none;
}
#camera-preview.active { display: block; }
/* Small rounded preview during active session */
#camera-preview.session-preview {
  display: block;
  width: 120px;
  height: 90px;
  border-radius: 12px;
  position: fixed;
  top: 80px;
  right: 12px;
  z-index: 20;
  border: 2px solid rgba(255,255,255,0.6);
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}
.camera-thumb {
  position: absolute;
  bottom: 8px;
  right: 8px;
  display: none;
}
.camera-thumb canvas {
  width: 80px;
  height: 60px;
  border-radius: 6px;
  border: 2px solid #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

/* ---- STATUS INDICATOR ---- */
.status-bar {
  display: none;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 8px;
  background: var(--header-bg);
  flex-shrink: 0;
}
.status-bar.active { display: flex; }
.status-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.status-dot.green {
  background: var(--accent-green);
  animation: pulse 1.5s ease-in-out infinite;
}
.status-dot.orange {
  background: #f39c12;
  animation: pulse 1s ease-in-out infinite;
}
.status-dot.blue {
  background: #3498db;
  animation: pulse 1s ease-in-out infinite;
}
.status-dot.gray {
  background: #888;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}
.status-bar .status-text {
  color: #ccc;
  font-size: 13px;
  font-weight: 500;
}

/* ---- TRANSCRIPT BAR ---- */
.transcript-bar {
  padding: 8px 16px;
  background: #fff;
  border-bottom: 1px solid #eee;
  font-size: 14px;
  color: var(--text-secondary);
  min-height: 0;
  flex-shrink: 0;
  display: none;
}
.transcript-bar.active { display: block; }
.transcript-bar .label { font-weight: 600; color: var(--text-primary); }

/* ---- TUTORIAL CARDS ---- */
.cards-area {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 12px 16px 120px;
}

.card {
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 16px;
  margin-bottom: 12px;
  animation: slideUp 0.3s ease-out;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.card .step-badge {
  display: inline-block;
  background: var(--header-bg);
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  margin-bottom: 8px;
}
.card .instruction {
  font-size: 16px;
  line-height: 1.5;
  margin-bottom: 10px;
}
.card .tools-needed {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 10px;
}
.card .tools-needed strong { color: var(--text-primary); }
.card .card-image {
  width: 100%;
  border-radius: 8px;
  margin-bottom: 10px;
  cursor: pointer;
  max-height: 200px;
  object-fit: cover;
  background: #eee;
}
.card .yt-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: #e74c3c;
  text-decoration: none;
  font-size: 14px;
  font-weight: 600;
}
.card .yt-link .yt-icon {
  width: 20px;
  height: 14px;
  background: #e74c3c;
  border-radius: 3px;
  position: relative;
  display: inline-block;
}
.card .yt-link .yt-icon::after {
  content: "";
  position: absolute;
  left: 7px;
  top: 3px;
  border-left: 7px solid #fff;
  border-top: 4px solid transparent;
  border-bottom: 4px solid transparent;
}

/* Agent text message card */
.card.agent-msg {
  background: #f7f8fa;
  border-left: 3px solid var(--header-bg);
}
.card.agent-msg .instruction {
  font-size: 15px;
}

/* Agent transcript bubble */
.card.agent-transcript {
  background: #eef2ff;
  border-left: 3px solid #6366f1;
}
.card.agent-transcript .label {
  font-weight: 600;
  color: #6366f1;
  font-size: 12px;
  margin-bottom: 4px;
}
.card.agent-transcript .transcript-content {
  font-size: 15px;
  line-height: 1.5;
}
.card.agent-transcript .transcript-content.partial {
  color: #999;
}
/* Audio spectrum visualization while agent speaks */
.card.agent-transcript .spectrum-viz {
  display: flex;
  align-items: flex-end;
  gap: 3px;
  height: 28px;
  padding: 4px 0;
}
.card.agent-transcript .spectrum-viz .bar {
  width: 5px;
  border-radius: 2px;
  background: #6366f1;
  transition: height 0.12s ease;
}
/* Fade transition for spectrum -> text */
.card.agent-transcript .transcript-content {
  transition: opacity 0.3s ease;
}
.card.agent-transcript .transcript-content.fade-in {
  animation: fadeTextIn 0.35s ease forwards;
}
@keyframes fadeTextIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

/* User chat bubble */
.card.user-bubble {
  background: #e8f5e9;
  border-left: 3px solid var(--accent-green);
}
.card.user-bubble .label {
  font-weight: 600;
  color: #2e7d32;
  font-size: 12px;
  margin-bottom: 4px;
}
.card.user-bubble .user-text {
  font-size: 15px;
  line-height: 1.5;
  color: var(--text-primary);
}

/* Thinking indicator */
.thinking-card {
  background: #f7f8fa;
  border-left: 3px solid #f39c12;
  display: none;
}
.thinking-card.active { display: block; }
.thinking-card .thinking-text {
  font-size: 14px;
  color: #888;
  display: flex;
  align-items: center;
  gap: 8px;
}
.thinking-dots span {
  display: inline-block;
  width: 6px;
  height: 6px;
  background: #aaa;
  border-radius: 50%;
  animation: thinkBounce 1.4s infinite both;
}
.thinking-dots span:nth-child(2) { animation-delay: 0.16s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.32s; }
@keyframes thinkBounce {
  0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
  40% { transform: scale(1); opacity: 1; }
}

/* Safety warning card */
.card.safety-warning {
  background: #fff3cd;
  border-left: 3px solid #ff9800;
}

/* ---- CONTROLS ---- */
.controls {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 16px;
  padding-bottom: max(16px, env(safe-area-inset-bottom));
  background: linear-gradient(transparent, var(--body-bg) 20%);
  display: flex;
  justify-content: center;
  z-index: 10;
}
#start-btn, #stop-btn {
  border: none;
  border-radius: 50px;
  font-size: 18px;
  font-weight: 700;
  padding: 16px 48px;
  cursor: pointer;
  transition: transform 0.15s, opacity 0.15s;
  -webkit-tap-highlight-color: transparent;
}
#start-btn:active, #stop-btn:active { transform: scale(0.95); }
#start-btn {
  background: var(--accent-green);
  color: #fff;
}
#stop-btn {
  background: var(--accent-red);
  color: #fff;
  display: none;
}

/* ---- IMAGE LIGHTBOX ---- */
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 200;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.lightbox.open { display: flex; }
.lightbox img {
  max-width: 95%;
  max-height: 90%;
  border-radius: 8px;
}

/* ---- EMPTY STATE ---- */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: #999;
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 15px; line-height: 1.5; }

/* ---- HIDDEN ELEMENTS ---- */
canvas.hidden-canvas { display: none; }
</style>
</head>
<body>

<header>
  <div class="top-row">
    <div>
      <h1>&#128295; Clutch</h1>
      <div class="tagline">The only tool in your box that tells you what to do next.</div>
    </div>
    <div class="header-controls">
      <select id="lang-select" aria-label="Language">
        <option value="en">English</option>
        <option value="es">Espa&#241;ol</option>
        <option value="vi">Ti&#7871;ng Vi&#7879;t</option>
        <option value="fr">Fran&#231;ais</option>
      </select>
      <button class="settings-btn" id="settings-btn" aria-label="Settings">&#9881;</button>
    </div>
  </div>
</header>

<!-- Settings Modal -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <h2>Settings</h2>
    <label for="ws-url-input">WebSocket URL</label>
    <input type="text" id="ws-url-input" value="">
    <div class="modal-actions">
      <button class="btn-cancel" id="modal-cancel">Cancel</button>
      <button class="btn-save" id="modal-save">Save</button>
    </div>
  </div>
</div>

<!-- Image Lightbox -->
<div class="lightbox" id="lightbox">
  <img id="lightbox-img" src="" alt="Enlarged image">
</div>

<main>
  <!-- Camera preview -->
  <div class="camera-container" id="camera-container">
    <video id="camera-preview" autoplay playsinline muted></video>
  </div>

  <!-- Status indicator bar -->
  <div class="status-bar" id="status-bar">
    <div class="status-dot green" id="status-dot"></div>
    <span class="status-text" id="status-text">Ready</span>
  </div>

  <!-- Live transcript -->
  <div class="transcript-bar" id="transcript-bar">
    <span class="label">You: </span><span id="transcript-text"></span>
  </div>

  <!-- Tutorial cards list -->
  <div class="cards-area" id="cards-area">
    <div class="empty-state" id="empty-state">
      <div class="icon">&#128064;</div>
      <p>Point your camera at whatever you need help with,<br>then tap <strong>Start Session</strong>.</p>
    </div>
    <!-- Thinking indicator (moved into cards for flow) -->
    <div class="card thinking-card" id="thinking-card">
      <div class="thinking-text">
        Clutch is thinking
        <span class="thinking-dots"><span></span><span></span><span></span></span>
      </div>
    </div>
  </div>
</main>

<!-- Controls -->
<div class="controls">
  <button id="start-btn">Start Session</button>
  <button id="stop-btn">Stop Session</button>
</div>

<!-- Hidden canvas for frame capture -->
<canvas class="hidden-canvas" id="capture-canvas"></canvas>

<script>
(function() {
  "use strict";

  // ---- State ----
  var ws = null;
  var mediaStream = null;
  var audioContext = null;
  var audioWorkletNode = null;
  var micGainNode = null;
  var frameInterval = null;
  var sessionActive = false;
  var playbackCtx = null;
  var nextPlayTime = 0;
  var activeSources = [];
  var agentSpeaking = false;

  // Status: "ready", "listening", "thinking", "speaking"
  var currentStatus = "ready";

  // Agent transcript tracking
  var currentAgentTranscriptCard = null;
  var spectrumAnimFrame = null;
  var activeSpectrumBars = null;

  // Thinking debounce
  var thinkingDebounceTimer = null;

  // ---- DOM refs ----
  var startBtn = document.getElementById("start-btn");
  var stopBtn = document.getElementById("stop-btn");
  var cameraPreview = document.getElementById("camera-preview");
  var cameraContainer = document.getElementById("camera-container");
  var captureCanvas = document.getElementById("capture-canvas");
  var cardsArea = document.getElementById("cards-area");
  var emptyState = document.getElementById("empty-state");
  var statusBar = document.getElementById("status-bar");
  var statusDot = document.getElementById("status-dot");
  var statusText = document.getElementById("status-text");
  var transcriptBar = document.getElementById("transcript-bar");
  var transcriptText = document.getElementById("transcript-text");
  var langSelect = document.getElementById("lang-select");
  var settingsBtn = document.getElementById("settings-btn");
  var settingsModal = document.getElementById("settings-modal");
  var wsUrlInput = document.getElementById("ws-url-input");
  var modalCancel = document.getElementById("modal-cancel");
  var modalSave = document.getElementById("modal-save");
  var lightbox = document.getElementById("lightbox");
  var lightboxImg = document.getElementById("lightbox-img");
  var thinkingCard = document.getElementById("thinking-card");

  // Derive default WS URL from the current page host
  function getDefaultWsUrl() {
    var proto = location.protocol === "https:" ? "wss:" : "ws:";
    return proto + "//" + location.host;
  }

  // Load saved WS URL or use auto-detected default
  var savedUrl = localStorage.getItem("clutch_ws_url");
  wsUrlInput.value = savedUrl || getDefaultWsUrl();
  wsUrlInput.placeholder = getDefaultWsUrl();

  // ---- Status Management ----
  function setStatus(status) {
    currentStatus = status;
    switch (status) {
      case "listening":
        statusDot.className = "status-dot green";
        statusText.textContent = "Listening...";
        break;
      case "thinking":
        statusDot.className = "status-dot orange";
        statusText.textContent = "Clutch is thinking...";
        break;
      case "speaking":
        statusDot.className = "status-dot blue";
        statusText.textContent = "Speaking...";
        break;
      case "ready":
      default:
        statusDot.className = "status-dot gray";
        statusText.textContent = "Ready";
        break;
    }
  }

  // ---- Settings Modal ----
  settingsBtn.addEventListener("click", function() {
    settingsModal.classList.add("open");
  });
  modalCancel.addEventListener("click", function() {
    settingsModal.classList.remove("open");
  });
  modalSave.addEventListener("click", function() {
    localStorage.setItem("clutch_ws_url", wsUrlInput.value.trim());
    settingsModal.classList.remove("open");
  });
  settingsModal.addEventListener("click", function(e) {
    if (e.target === settingsModal) settingsModal.classList.remove("open");
  });

  // ---- Lightbox ----
  lightbox.addEventListener("click", function() {
    lightbox.classList.remove("open");
  });

  function openLightbox(src) {
    lightboxImg.src = src;
    lightbox.classList.add("open");
  }

  // ---- Language selector ----
  langSelect.addEventListener("change", function() {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: "config", language: langSelect.value }));
    }
  });

  // ---- Camera ----
  async function startCamera() {
    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: {
          sampleRate: 16000,
          channelCount: 1,
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true
        }
      });
      cameraPreview.srcObject = mediaStream;
    } catch (err) {
      alert("Camera/microphone access is required. Please allow permissions and try again.");
      throw err;
    }
  }

  // ---- Frame Capture ----
  function startFrameCapture() {
    var ctx = captureCanvas.getContext("2d");

    frameInterval = setInterval(function() {
      if (!cameraPreview.videoWidth) return;

      var w = 640;
      var h = Math.round(cameraPreview.videoHeight * (640 / cameraPreview.videoWidth));
      captureCanvas.width = w;
      captureCanvas.height = h;
      ctx.drawImage(cameraPreview, 0, 0, w, h);

      var dataUrl = captureCanvas.toDataURL("image/jpeg", 0.7);
      var base64 = dataUrl.split(",")[1];
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: "video", data: base64 }));
      }
    }, 500);
  }

  function stopFrameCapture() {
    if (frameInterval) {
      clearInterval(frameInterval);
      frameInterval = null;
    }
  }

  // ---- Audio Capture (PCM 16kHz) ----
  function startAudioCapture() {
    var AudioCtx = window.AudioContext || window.webkitAudioContext;
    audioContext = new AudioCtx({ sampleRate: 16000 });

    var source = audioContext.createMediaStreamSource(mediaStream);

    // Gain node for echo cancellation (mute mic when agent speaks)
    micGainNode = audioContext.createGain();
    micGainNode.gain.value = 1.0;
    source.connect(micGainNode);

    var bufferSize = 4096;
    var processor = audioContext.createScriptProcessor(bufferSize, 1, 1);

    processor.onaudioprocess = function(e) {
      if (!sessionActive) return;
      var float32 = e.inputBuffer.getChannelData(0);
      var int16 = new Int16Array(float32.length);
      for (var i = 0; i < float32.length; i++) {
        var s = Math.max(-1, Math.min(1, float32[i]));
        int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
      }
      var bytes = new Uint8Array(int16.buffer);
      var base64 = arrayBufferToBase64(bytes);
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
          type: "audio",
          data: base64,
          mime_type: "audio/pcm;rate=16000"
        }));
      }
    };

    micGainNode.connect(processor);
    processor.connect(audioContext.destination);
    audioWorkletNode = processor;
  }

  function setMicMuted(muted) {
    if (micGainNode) {
      micGainNode.gain.setTargetAtTime(muted ? 0.0 : 1.0, audioContext.currentTime, 0.03);
    }
  }

  function stopAudioCapture() {
    if (audioWorkletNode) {
      audioWorkletNode.disconnect();
      audioWorkletNode = null;
    }
    micGainNode = null;
    if (audioContext) {
      audioContext.close();
      audioContext = null;
    }
  }

  function arrayBufferToBase64(buffer) {
    var binary = "";
    var bytes = new Uint8Array(buffer);
    for (var i = 0; i < bytes.byteLength; i++) {
      binary += String.fromCharCode(bytes[i]);
    }
    return btoa(binary);
  }

  // ---- Audio Playback (gapless, time-scheduled) ----
  function initPlayback() {
    var AudioCtx = window.AudioContext || window.webkitAudioContext;
    playbackCtx = new AudioCtx({ sampleRate: 24000 });
    nextPlayTime = 0;
    if (playbackCtx.state === "suspended") {
      playbackCtx.resume();
    }
  }

  function playAudioChunk(base64Data, mimeType) {
    if (!playbackCtx) initPlayback();

    var raw = atob(base64Data);
    var bytes = new Uint8Array(raw.length);
    for (var i = 0; i < raw.length; i++) {
      bytes[i] = raw.charCodeAt(i);
    }

    var sampleRate = 24000;
    var rateMatch = mimeType && mimeType.match(/rate=(\d+)/);
    if (rateMatch) sampleRate = parseInt(rateMatch[1]);

    var int16 = new Int16Array(bytes.buffer);
    var float32 = new Float32Array(int16.length);
    for (var j = 0; j < int16.length; j++) {
      float32[j] = int16[j] / 32768;
    }

    var buffer = playbackCtx.createBuffer(1, float32.length, sampleRate);
    buffer.getChannelData(0).set(float32);

    var source = playbackCtx.createBufferSource();
    source.buffer = buffer;
    source.connect(playbackCtx.destination);

    // Schedule seamlessly: start right after the previous chunk ends
    var now = playbackCtx.currentTime;
    var startTime = Math.max(now + 0.005, nextPlayTime);
    source.start(startTime);
    nextPlayTime = startTime + buffer.duration;

    // Track active sources for interruption
    activeSources.push(source);
    source.onended = function() {
      var idx = activeSources.indexOf(source);
      if (idx !== -1) activeSources.splice(idx, 1);
      // If no more sources playing, agent finished speaking
      if (activeSources.length === 0 && agentSpeaking) {
        agentSpeaking = false;
        setMicMuted(false);
        if (sessionActive) setStatus("listening");
      }
    };

    // Agent is speaking — mute mic to prevent feedback
    if (!agentSpeaking) {
      agentSpeaking = true;
      setMicMuted(true);
      setStatus("speaking");
      hideThinking();
    }
  }

  function stopAllPlayback() {
    activeSources.forEach(function(s) {
      try { s.stop(); } catch (e) {}
    });
    activeSources = [];
    nextPlayTime = 0;
    agentSpeaking = false;
    setMicMuted(false);
  }

  // ---- Thinking Indicator ----
  function showThinking() {
    thinkingCard.classList.add("active");
    scrollToBottom();
  }

  function hideThinking() {
    thinkingCard.classList.remove("active");
    clearTimeout(thinkingDebounceTimer);
  }

  // ---- Audio Spectrum Visualization ----
  function startSpectrumAnim(bars) {
    activeSpectrumBars = bars;
    function animate() {
      if (!activeSpectrumBars) return;
      for (var i = 0; i < activeSpectrumBars.length; i++) {
        // Each bar gets a randomized height that varies over time
        var base = 8 + Math.sin(Date.now() * 0.006 + i * 1.8) * 6;
        var jitter = Math.random() * 10;
        activeSpectrumBars[i].style.height = Math.max(3, base + jitter) + "px";
      }
      spectrumAnimFrame = requestAnimationFrame(animate);
    }
    animate();
  }

  function stopSpectrumAnim() {
    activeSpectrumBars = null;
    if (spectrumAnimFrame) {
      cancelAnimationFrame(spectrumAnimFrame);
      spectrumAnimFrame = null;
    }
  }

  // ---- Agent Transcript ----
  function showAgentTranscript(text, isPartial) {
    hideEmptyState();
    hideThinking();

    if (!currentAgentTranscriptCard) {
      currentAgentTranscriptCard = document.createElement("div");
      currentAgentTranscriptCard.className = "card agent-transcript";
      currentAgentTranscriptCard.innerHTML = '<div class="label">Clutch:</div>';

      // Start with spectrum visualization
      var viz = document.createElement("div");
      viz.className = "spectrum-viz";
      for (var i = 0; i < 7; i++) {
        var bar = document.createElement("div");
        bar.className = "bar";
        bar.style.height = "4px";
        viz.appendChild(bar);
      }
      currentAgentTranscriptCard.appendChild(viz);

      // Hidden text element, revealed on final
      var content = document.createElement("div");
      content.className = "transcript-content";
      content.style.display = "none";
      currentAgentTranscriptCard.appendChild(content);

      cardsArea.insertBefore(currentAgentTranscriptCard, thinkingCard);

      // Animate the bars
      startSpectrumAnim(viz.querySelectorAll(".bar"));
    }

    var content = currentAgentTranscriptCard.querySelector(".transcript-content");
    content.textContent = text;

    if (isPartial) {
      // Keep showing spectrum while partial
      content.style.display = "none";
    } else {
      // Final transcript: stop spectrum, reveal text with animation
      stopSpectrumAnim();
      var viz = currentAgentTranscriptCard.querySelector(".spectrum-viz");
      if (viz) viz.remove();
      content.style.display = "";
      content.classList.add("fade-in");
      // Detach so next utterance gets a new card
      currentAgentTranscriptCard = null;
    }
    scrollToBottom();
  }

  // ---- User Chat Bubble ----
  function addUserBubble(text) {
    hideEmptyState();
    var card = document.createElement("div");
    card.className = "card user-bubble";
    card.innerHTML =
      '<div class="label">You:</div>' +
      '<div class="user-text">' + escapeHtml(text) + '</div>';
    cardsArea.insertBefore(card, thinkingCard);
    scrollToBottom();
  }

  // ---- WebSocket ----
  function connectWebSocket() {
    var url = wsUrlInput.value.trim() || getDefaultWsUrl();
    ws = new WebSocket(url);

    ws.onopen = function() {
      console.log("WebSocket connected");
      ws.send(JSON.stringify({ type: "config", language: langSelect.value }));
      ws.send(JSON.stringify({ type: "activity_start" }));
      setStatus("listening");
    };

    ws.onmessage = function(event) {
      var msg;
      try {
        msg = JSON.parse(event.data);
      } catch (e) {
        return;
      }
      handleServerMessage(msg);
    };

    ws.onclose = function() {
      console.log("WebSocket closed");
      if (sessionActive) stopSession();
    };

    ws.onerror = function(err) {
      console.error("WebSocket error", err);
    };
  }

  function handleServerMessage(msg) {
    switch (msg.type) {
      case "audio":
        playAudioChunk(msg.data, msg.mime_type);
        break;

      case "text":
        hideThinking();
        addAgentTextCard(msg.text);
        break;

      case "input_transcription":
        transcriptBar.classList.add("active");
        transcriptText.textContent = msg.text;
        if (!msg.partial) {
          var wordCount = (msg.text || "").trim().split(/\s+/).filter(Boolean).length;
          if (wordCount > 3) {
            // Add user bubble to conversation history
            addUserBubble(msg.text);
            // Debounce: wait 500ms before showing thinking
            clearTimeout(thinkingDebounceTimer);
            thinkingDebounceTimer = setTimeout(function() {
              if (currentStatus === "listening" || currentStatus === "ready") {
                setStatus("thinking");
                showThinking();
              }
            }, 500);
          }
          // Short utterances (<=3 words) are likely noise — stay in listening
        } else {
          // Partial transcription — cancel any pending thinking transition
          clearTimeout(thinkingDebounceTimer);
        }
        break;

      case "output_transcription":
        showAgentTranscript(msg.text, msg.partial);
        if (!msg.partial) {
          setStatus("speaking");
        }
        break;

      case "tool_result":
        hideThinking();
        if (msg.results) {
          msg.results.forEach(function(r) {
            handleToolResult(r.tool, r.result);
          });
        }
        break;

      case "turn_complete":
        // Agent finished this turn — session stays alive for follow-ups
        hideThinking();
        if (!agentSpeaking && sessionActive) {
          setStatus("listening");
        }
        break;

      case "interrupted":
        // Barge-in: stop playback immediately
        stopAllPlayback();
        hideThinking();
        if (sessionActive) setStatus("listening");
        break;
    }
  }

  // ---- Render Cards ----
  function hideEmptyState() {
    if (emptyState) emptyState.style.display = "none";
  }

  function addAgentTextCard(text) {
    hideEmptyState();

    var jsonMatch = text.match(/```json\s*([\s\S]*?)```/);
    var cleanText = text.replace(/```json\s*[\s\S]*?```/g, "").trim();

    if (cleanText) {
      var card = document.createElement("div");
      card.className = "card agent-msg";

      var lower = cleanText.toLowerCase();
      if (lower.indexOf("warning") !== -1 || lower.indexOf("danger") !== -1 || lower.indexOf("careful") !== -1 || lower.indexOf("hold on") !== -1) {
        card.className = "card safety-warning";
      }

      card.innerHTML = '<p class="instruction">' + escapeHtml(cleanText) + '</p>';
      cardsArea.insertBefore(card, thinkingCard);
      scrollToBottom();
    }

    if (jsonMatch) {
      try {
        var data = JSON.parse(jsonMatch[1]);
        if (data.tutorial_card) renderTutorialCard(data.tutorial_card);
      } catch (e) { /* ignore parse errors */ }
    }
  }

  function handleToolResult(toolName, result) {
    hideEmptyState();

    if (toolName === "analyze_task" && result) {
      var card = document.createElement("div");
      card.className = "card";
      var html = '<div class="step-badge">Task Identified</div>';
      html += '<p class="instruction">' + escapeHtml(result.task_description || "") + '</p>';
      if (result.domain) {
        html += '<p class="tools-needed"><strong>Domain:</strong> ' + escapeHtml(result.domain) + '</p>';
      }
      if (result.safety_warnings && result.safety_warnings.length > 0) {
        result.safety_warnings.forEach(function(w) {
          html += '<p class="tools-needed" style="color:#e74c3c"><strong>&#9888; Warning:</strong> ' + escapeHtml(w) + '</p>';
        });
      }
      card.innerHTML = html;
      cardsArea.insertBefore(card, thinkingCard);
      scrollToBottom();
    }

    if (toolName === "generate_steps" && result && result.steps) {
      result.steps.forEach(function(step) {
        addStepCard(step, [], []);
      });
    }

    if (toolName === "search_images" && result && Array.isArray(result)) {
      var lastCard = cardsArea.querySelector(".card.step-card:last-of-type");
      if (lastCard) {
        result.forEach(function(img) {
          if (img.image_url) {
            var imgEl = document.createElement("img");
            imgEl.className = "card-image";
            imgEl.src = img.image_url;
            imgEl.alt = img.title || "Reference image";
            imgEl.loading = "lazy";
            imgEl.addEventListener("click", function() { openLightbox(img.image_url); });
            lastCard.appendChild(imgEl);
          }
        });
      }
    }

    if (toolName === "search_youtube" && result && Array.isArray(result)) {
      var lastCard = cardsArea.querySelector(".card:last-child");
      if (lastCard) {
        result.forEach(function(vid) {
          if (vid.video_url) {
            var a = document.createElement("a");
            a.className = "yt-link";
            a.href = vid.video_url;
            a.target = "_blank";
            a.rel = "noopener";
            a.innerHTML = '<span class="yt-icon"></span> ' + escapeHtml(vid.title || "Watch video") +
              (vid.duration ? ' (' + escapeHtml(vid.duration) + ')' : '');
            lastCard.appendChild(a);
          }
        });
      }
    }
  }

  function renderTutorialCard(tc) {
    if (tc.steps) {
      tc.steps.forEach(function(step) {
        addStepCard(step, tc.images || [], tc.videos || []);
      });
    }
    if (tc.videos && tc.videos.length && (!tc.steps || !tc.steps.length)) {
      tc.videos.forEach(function(vid) {
        var card = document.createElement("div");
        card.className = "card";
        card.innerHTML = '<a class="yt-link" href="' + escapeAttr(vid.video_url || vid.url || "") +
          '" target="_blank" rel="noopener"><span class="yt-icon"></span> ' +
          escapeHtml(vid.title || "Watch video") + '</a>';
        cardsArea.insertBefore(card, thinkingCard);
      });
      scrollToBottom();
    }
  }

  function addStepCard(step, images, videos) {
    var card = document.createElement("div");
    card.className = "card step-card";
    var html = '<div class="step-badge">Step ' + (step.number || "?") + '</div>';
    html += '<p class="instruction">' + escapeHtml(step.instruction || "") + '</p>';
    if (step.tools_needed && step.tools_needed.length) {
      html += '<p class="tools-needed"><strong>Tools:</strong> ' + escapeHtml(step.tools_needed.join(", ")) + '</p>';
    }
    card.innerHTML = html;

    if (images && images.length) {
      var idx = (step.number || 1) - 1;
      var img = images[idx] || images[0];
      if (img && (img.image_url || img.url)) {
        var imgEl = document.createElement("img");
        imgEl.className = "card-image";
        imgEl.src = img.image_url || img.url;
        imgEl.alt = img.title || "Step image";
        imgEl.loading = "lazy";
        imgEl.addEventListener("click", function() { openLightbox(imgEl.src); });
        card.appendChild(imgEl);
      }
    }

    cardsArea.insertBefore(card, thinkingCard);
    scrollToBottom();
  }

  function scrollToBottom() {
    cardsArea.scrollTop = cardsArea.scrollHeight;
  }

  function escapeHtml(str) {
    var div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  function escapeAttr(str) {
    return str.replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/'/g, "&#39;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  // ---- Session Control ----
  async function startSession() {
    try {
      await startCamera();
    } catch (e) {
      return;
    }

    sessionActive = true;
    startBtn.style.display = "none";
    stopBtn.style.display = "inline-block";

    // Show camera as small floating preview
    cameraPreview.classList.remove("active");
    cameraPreview.classList.add("session-preview");

    statusBar.classList.add("active");
    setStatus("ready");

    initPlayback();
    connectWebSocket();
    startFrameCapture();
    startAudioCapture();
  }

  function stopSession() {
    sessionActive = false;
    startBtn.style.display = "inline-block";
    stopBtn.style.display = "none";

    statusBar.classList.remove("active");
    transcriptBar.classList.remove("active");
    cameraPreview.classList.remove("active");
    cameraPreview.classList.remove("session-preview");
    hideThinking();
    stopSpectrumAnim();
    currentAgentTranscriptCard = null;

    stopFrameCapture();
    stopAudioCapture();
    stopAllPlayback();

    if (ws) {
      try {
        ws.send(JSON.stringify({ type: "activity_end" }));
      } catch (e) {}
      ws.close();
      ws = null;
    }

    if (mediaStream) {
      mediaStream.getTracks().forEach(function(t) { t.stop(); });
      mediaStream = null;
    }

    if (playbackCtx) {
      playbackCtx.close();
      playbackCtx = null;
    }
  }

  startBtn.addEventListener("click", startSession);
  stopBtn.addEventListener("click", stopSession);

})();
</script>
